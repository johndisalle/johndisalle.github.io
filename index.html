<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abide Journey</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: linear-gradient(135deg, #6E8F85 0%, #4F6E66 100%);
    color: #fff;
  }
  .card { max-width: 420px; width: 100%; text-align: center; padding: 48px 32px; }
  .wordmark { font-family: Georgia, serif; font-size: 32px; font-weight: 500; margin-bottom: 12px; letter-spacing: 0.5px; }
  .tagline { font-family: Georgia, serif; font-style: italic; color: rgba(255,255,255,0.75); font-size: 17px; margin-bottom: 40px; }
  .btn {
    display: inline-block;
    background: #E3D3A8; color: #2B3A36;
    padding: 16px 32px; border-radius: 14px;
    font-weight: 600; font-size: 17px;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Abide Journey</div>
    <div class="tagline">A 40-day devotional journey</div>
    <a class="btn" href="https://apps.apple.com/app/id6760856253">Download on the App Store</a>
  </div>
</body>
</html>
